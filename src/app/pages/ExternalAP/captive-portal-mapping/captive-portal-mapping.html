<div class="pageheader">
  <h1>Captive Portal Mapping</h1>
  <div>
    <button
      mat-raised-button
      color="primary"
      class="float-right"
      (click)="openCaptivePortalMappingModal(addEditCaptivePortalMapping)"
    >
      <mat-icon>add</mat-icon>
      Captive Portal Mapping
    </button>
  </div>
</div>

<div class="row">
  <app-table
    [dataSize]="dataSize"
    [tableHeaders]="displayedColumns"
    [tableButtons]="tableButtons"
    [tableData]="dataSource"
    (eventEmitRecordOperation)="triggerRecordOperation($event)"
  ></app-table>
</div>

<ng-template #addEditCaptivePortalMapping let-modal>
  <div class="modal-header">
    <h4 class="modal-title"> Captive Portal Mapping</h4>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="row">
      <div class="">
        <form [formGroup]="form" (ngSubmit)="saveCaptivePortalMapping()" class="p-3">
          <formly-form
            [form]="form"
            [fields]="formFields"
            [model]="formModel"
            [options]="formOptions"
          >
          </formly-form>
          <div class="modal-footer">
            <button
              type="submit"
              class="btn btn-success mx-1"
              [disabled]="!form.valid"
            >
               {{ isEditMode ? "Update" : "Submit" }}
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              (click)="modal.close('Close click')"
            >
              Close
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</ng-template>

<!-- No Records Message -->
@if (dataSource.length === 0 ) {
<div class="alert alert-warning text-center fs-5">No Record Found...</div>
}
