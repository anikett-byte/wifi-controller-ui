<div class="pageheader">
  <h1>NAS Manager</h1>
  <div>
    <button mat-raised-button color="primary" class="float-right" (click)="openCompanyDetailsModal(content)">
      <mat-icon>add</mat-icon>
      NAS
    </button>
  </div>
</div>

<div class="row">

    <app-table [dataSize]="dataSize" [rowCheckbox]="enableCheckbox" [tableHeaders]="displayedColumns"  [tableButtons]="tableButtons" [tableData]="dataSource" (rowSelectionEventEmit)="getSelectedRows($event)" (eventEmitPageRecord)="getTableData($event)" (eventEmitRecordOperation)="triggerRecordOperation($event)" ></app-table>

</div>

<ng-template #content let-modal>
	<div class="modal-header">
		<h4 class="modal-title">NAS Details</h4>
		<button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
	</div>
	<div class="modal-body">
        <div class="row">
            <div class="col-12 col-md-12 col-lg-12 col-xxl-12">

		<form [formGroup]="form" (ngSubmit)="addNas()" class="p-3">
            <formly-form
                [form]="form"
                [fields]="formFields"
                [model]="formModel"
                [options]="formOptions">
            </formly-form>
            <div class="modal-footer">
                <button type="submit" class="btn btn-success mx-1" [disabled]="!form.valid">Submit</button>
		        <button type="button" class="btn btn-secondary" (click)="modal.close('Close click')">Close</button>
	        </div>
            </form>
            </div>
        </div>
	</div>
</ng-template>

<!-- ------------------------------------------------- Delete Modal ----------------------------------------- -->

<ng-template #modalConfirmDelete let-modal>
  <div class="modal-header">
    <h4 class="modal-title">Confirm Delete</h4>
    <!-- <button type="button" class="close" (click)="modal.dismiss('cancel')">
      &times;
    </button> -->
  </div>
  <div class="modal-body"></div>
  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-secondary"
      (click)="modal.dismiss('cancel')"
    >
      Cancel
    </button>
    <button
      type="button"
      class="btn btn-danger"
      (click)="modal.close('confirm')"
    >
     Delete
    </button>
  </div>
</ng-template>
