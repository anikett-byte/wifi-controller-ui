<div class="pageheader">
  <h1>Orchestrator</h1>
  <div>
    <button
      mat-raised-button
      color="primary"
      class="float-right"
      (click)="openCompanyDetailsModal(content)"
    >
      <mat-icon>add</mat-icon>
      Orchestrator
    </button>
  </div>
</div>

<div class="row">
  <app-table
    [dataSize]="dataSize"
    [rowCheckbox]="enableCheckbox"
    [tableHeaders]="displayedColumns"
    [tableButtons]="tableButtons"
    [tableData]="dataSource"
    (rowSelectionEventEmit)="getSelectedRows($event)"
    (eventEmitPageRecord)="getTableData($event)"
    (eventEmitRecordOperation)="triggerRecordOperation($event)"
  ></app-table>
</div>

<ng-template #content let-modal>
  <div class="modal-header">
    <h4 class="modal-title">Orchestrator Details</h4>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="row">
      <div class="col-12 col-md-12 col-lg-12 col-xxl-12">
        <form [formGroup]="form" (ngSubmit)="addOrchestrator()" class="p-3">
          <formly-form
            [form]="form"
            [fields]="formFields"
            [model]="formModel"
            [options]="formOptions"
          >
          </formly-form>
          <div class="modal-footer">
            <button
              type="submit"
              class="btn btn-success mx-1"
              [disabled]="!form.valid"
            >
              Submit
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              (click)="modal.close('Close click')"
            >
              Close
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</ng-template>

<!-- No Records Message -->
<ng-container *ngIf="dataSource.length === 0">
  <div class="alert alert-warning text-center fs-5">No Record Found...</div>
</ng-container>
